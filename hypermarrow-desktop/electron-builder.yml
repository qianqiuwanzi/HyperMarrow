appId: cool.qianshi.hypermarrow
productName: 智商藏不住
copyright: Copyright © 2026 OpenClaw
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/renderer/**/*
  - package.json
extraResources:
  - from: ../start.py
    to: start.py
  - from: ../stop.py
    to: stop.py
  - from: ../openclaw-memory-system
    to: openclaw-memory-system
  - from: ../openclaw-learning-system
    to: openclaw-learning-system
  - from: ../config.yaml
    to: config.yaml
win:
  target: [{ target: nsis, arch: [x64] }]
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}-win-x64.${ext}
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 智商藏不住
mac:
  target: [{ target: dmg, arch: [x64, arm64] }]
  icon: build/icon.icns
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  category: public.app-category.developer-tools
  hardenedRuntime: true
publish:
  provider: generic
  url: https://cdn.qianshi.cool/download
  channel: latest
