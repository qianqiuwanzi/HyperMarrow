appId: cool.qianshi.hypermarrow
productName: 智商藏不住
copyright: Copyright © 2026 OpenClaw
directories:
  output: release
  buildResources: build
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
files:
  - dist/**/*
  - src/renderer/**/*
  - package.json
extraResources:
  - from: ../dist/pyd/start.py
    to: start.py
  - from: ../dist/pyd/stop.py
    to: stop.py
  - from: ../dist/pyd/openclaw-memory-system
    to: openclaw-memory-system
  - from: ../dist/pyd/openclaw-learning-system
    to: openclaw-learning-system
  - from: ../dist/pyd/config.yaml
    to: config.yaml
  - from: ../dist/pyd/py310
    to: py310
win:
  target: [{ target: nsis, arch: [x64] }]
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}-win-x64.${ext}
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 智商藏不住
  installerSidebar: null
  include: build/installer.nsh
mac:
  target: [{ target: dmg, arch: [x64, arm64] }]
  icon: build/icon.icns
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  category: public.app-category.developer-tools
  hardenedRuntime: true
publish:
  provider: generic
  url: https://cdn.qianshi.cool/download
  channel: latest
