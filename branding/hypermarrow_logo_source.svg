<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="HyperMarrow Logo">
  <title>HyperMarrow</title>
  <desc>类人记忆与学习系统 HyperMarrow 产品图标 — 脑神经网络设计，象征记忆、连接与智能</desc>

  <defs>
    <!-- 主背景渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0a0d1a"/>
    </radialGradient>

    <!-- 核心节点发光 -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#0066ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0033cc" stop-opacity="0"/>
    </radialGradient>

    <!-- 中层节点渐变 -->
    <radialGradient id="nodeBlue" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#0052cc"/>
    </radialGradient>

    <radialGradient id="nodePurple" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>

    <radialGradient id="nodeTeal" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>

    <radialGradient id="nodePink" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </radialGradient>

    <radialGradient id="nodeGreen" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>

    <!-- 外层节点渐变 -->
    <radialGradient id="nodeOuter1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </radialGradient>

    <radialGradient id="nodeOuter2" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </radialGradient>

    <!-- 发光滤镜 -->
    <filter id="glowCore" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowNode" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowLine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ========== 背景 ========== -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- 背景装饰光晕 -->
  <ellipse cx="256" cy="230" rx="180" ry="160" fill="#0066ff" fill-opacity="0.07"/>
  <ellipse cx="200" cy="200" rx="100" ry="90" fill="#00d4ff" fill-opacity="0.05"/>

  <!-- ========== 连接线层（底） ========== -->
  <!-- 核心到内圈连线 -->
  <g stroke="#00d4ff" stroke-opacity="0.35" stroke-width="1.8" fill="none" filter="url(#glowLine)">
    <line x1="256" y1="200" x2="165" y2="248"/>
    <line x1="256" y1="200" x2="347" y2="248"/>
    <line x1="256" y1="200" x2="175" y2="328"/>
    <line x1="256" y1="200" x2="337" y2="328"/>
    <line x1="256" y1="200" x2="256" y2="310"/>
    <line x1="256" y1="200" x2="128" y2="200"/>
    <line x1="256" y1="200" x2="384" y2="200"/>
    <line x1="256" y1="200" x2="185" y2="148"/>
    <line x1="256" y1="200" x2="327" y2="148"/>
  </g>

  <!-- 内圈到外圈连线 -->
  <g stroke="#4da6ff" stroke-opacity="0.25" stroke-width="1.2" fill="none" filter="url(#glowLine)">
    <!-- 左区 -->
    <line x1="165" y1="248" x2="88" y2="268"/>
    <line x1="165" y1="248" x2="100" y2="198"/>
    <line x1="175" y1="328" x2="100" y2="358"/>
    <line x1="128" y1="200" x2="62" y2="182"/>
    <line x1="128" y1="200" x2="78" y2="248"/>
    <!-- 右区 -->
    <line x1="347" y1="248" x2="424" y2="268"/>
    <line x1="347" y1="248" x2="412" y2="198"/>
    <line x1="337" y1="328" x2="412" y2="358"/>
    <line x1="384" y1="200" x2="450" y2="182"/>
    <line x1="384" y1="200" x2="434" y2="248"/>
    <!-- 上区 -->
    <line x1="185" y1="148" x2="130" y2="108"/>
    <line x1="185" y1="148" x2="155" y2="82"/>
    <line x1="327" y1="148" x2="382" y2="108"/>
    <line x1="327" y1="148" x2="357" y2="82"/>
    <!-- 下区 -->
    <line x1="256" y1="310" x2="220" y2="390"/>
    <line x1="256" y1="310" x2="292" y2="390"/>
    <line x1="175" y1="328" x2="140" y2="390"/>
    <line x1="337" y1="328" x2="372" y2="390"/>
  </g>

  <!-- 外圈内部弱连线（增加网络密度感） -->
  <g stroke="#4da6ff" stroke-opacity="0.12" stroke-width="0.8" fill="none">
    <line x1="88" y1="268" x2="62" y2="182"/>
    <line x1="100" y1="358" x2="78" y2="248"/>
    <line x1="424" y1="268" x2="450" y2="182"/>
    <line x1="412" y1="358" x2="434" y2="248"/>
    <line x1="130" y1="108" x2="155" y2="82"/>
    <line x1="382" y1="108" x2="357" y2="82"/>
    <line x1="220" y1="390" x2="256" y2="400"/>
    <line x1="292" y1="390" x2="256" y2="400"/>
  <line x1="140" y1="390" x2="220" y2="390"/>
  <line x1="372" y1="390" x2="292" y2="390"/>
  </g>

  <!-- ========== 节点层 ========== -->
  <!-- 外圈节点（第三层）- 最小 -->
  <g filter="url(#glowNode)">
    <!-- 左外 -->
    <circle cx="62" cy="182" r="11" fill="url(#nodeOuter1)"/>
    <circle cx="78" cy="248" r="9" fill="url(#nodeOuter2)"/>
    <circle cx="88" cy="268" r="12" fill="url(#nodeBlue)"/>
    <circle cx="100" cy="358" r="10" fill="url(#nodePurple)"/>
    <circle cx="130" cy="108" r="10" fill="url(#nodeTeal)"/>
    <circle cx="155" cy="82" r="8" fill="url(#nodeOuter1)"/>
    <!-- 右外 -->
    <circle cx="450" cy="182" r="11" fill="url(#nodeOuter1)"/>
    <circle cx="434" cy="248" r="9" fill="url(#nodeOuter2)"/>
    <circle cx="424" cy="268" r="12" fill="url(#nodeBlue)"/>
    <circle cx="412" cy="358" r="10" fill="url(#nodePurple)"/>
    <circle cx="382" cy="108" r="10" fill="url(#nodeTeal)"/>
    <circle cx="357" cy="82" r="8" fill="url(#nodeOuter1)"/>
    <!-- 上下外 -->
    <circle cx="256" cy="400" r="12" fill="url(#nodeGreen)"/>
    <circle cx="220" cy="390" r="10" fill="url(#nodeBlue)"/>
    <circle cx="292" cy="390" r="10" fill="url(#nodeBlue)"/>
    <circle cx="140" cy="390" r="8" fill="url(#nodePurple)"/>
    <circle cx="372" cy="390" r="8" fill="url(#nodePurple)"/>
    <!-- 左右边缘 -->
    <circle cx="42" cy="310" r="9" fill="url(#nodeTeal)"/>
    <circle cx="470" cy="310" r="9" fill="url(#nodeTeal)"/>
    <circle cx="256" cy="62" r="9" fill="url(#nodeGreen)"/>
  </g>

  <!-- 中圈节点（第二层） -->
  <g filter="url(#glowNode)">
    <circle cx="165" cy="248" r="22" fill="url(#nodeBlue)"/>
    <circle cx="347" cy="248" r="22" fill="url(#nodePurple)"/>
    <circle cx="175" cy="328" r="20" fill="url(#nodeTeal)"/>
    <circle cx="337" cy="328" r="20" fill="url(#nodePink)"/>
    <circle cx="256" cy="310" r="21" fill="url(#nodeGreen)"/>
    <circle cx="128" cy="200" r="20" fill="url(#nodePurple)"/>
    <circle cx="384" cy="200" r="20" fill="url(#nodeBlue)"/>
    <circle cx="185" cy="148" r="19" fill="url(#nodeGreen)"/>
    <circle cx="327" cy="148" r="19" fill="url(#nodeTeal)"/>
  </g>

  <!-- 核心节点（最大/最亮） -->
  <g filter="url(#glowCore)">
    <!-- 外发光圈 -->
    <circle cx="256" cy="200" r="62" fill="url(#coreGlow)" fill-opacity="0.3"/>
    <!-- 中光环 -->
    <circle cx="256" cy="200" r="46" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
    <!-- 主节点体 -->
    <circle cx="256" cy="200" r="38" fill="#0d1b4a"/>
    <circle cx="256" cy="200" r="36" fill="url(#coreGlow)" fill-opacity="0.9"/>
    <!-- 内核亮点 -->
    <circle cx="244" cy="190" r="14" fill="#ffffff" fill-opacity="0.2"/>
    <circle cx="256" cy="200" r="10" fill="#00d4ff" fill-opacity="0.6"/>
    <circle cx="256" cy="200" r="5" fill="#ffffff" fill-opacity="0.8"/>
  </g>

  <!-- ========== 文字标识 ========== -->
  <!-- 品牌名 -->
  <text x="256" y="462"
        font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif"
        font-size="36" font-weight="700" text-anchor="middle"
        fill="#e0f2fe" letter-spacing="4">
    HyperMarrow
  </text>

  <!-- 标语（小字） -->
  <text x="256" y="488"
        font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="#64748b" letter-spacing="1.5">
    类人记忆与学习系统
  </text>
</svg>
