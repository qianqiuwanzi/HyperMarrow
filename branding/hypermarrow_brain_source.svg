<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="HyperMarrow Brain Logo">
  <title>HyperMarrow</title>
  <desc>HyperMarrow 产品图标 — 人脑轮廓造型，象征记忆与智能</desc>

  <defs>
    <linearGradient id="brainFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#4da6ff"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="brainFill2" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="80" fill="#0a0d1a"/>

  <!-- 背景微光 -->
  <ellipse cx="256" cy="240" rx="160" ry="150" fill="#0066ff" fill-opacity="0.06"/>

  <!-- ==============================
       人脑轮廓 — 简化风格，从右侧面视角
       ============================== -->
  <g id="brain" transform="translate(256,230)" filter="url(#softGlow)">

    <!-- 大脑半球轮廓（主要部分） -->
    <!-- 左半球主体 -->
    <path d="
      M -75,-120
      C -20,-135  30,-120  70,-95
      C 100,-75  115,-45  118,  5
      C 120,  45  108,  80   88, 105
      C  68, 128   42, 142   12, 148
      C -20, 152  -50, 142  -72, 120
      C -95,  96 -108,  60 -108,  18
      C -108,-28  -98, -72  -75,-120
      Z
    " fill="url(#brainFill2)" fill-opacity="0.92"/>

    <!-- 胼胝体（中间连接带） -->
    <path d="
      M -30,-55
      C -15,-62    5,-62   18,-55
      C  30,-48   30,-38   18,-32
      C   5,-26  -15,-26  -30,-32
      C -44,-38  -44,-48  -30,-55
      Z
    " fill="#0a0d1a" fill-opacity="0.85"/>

    <!-- 小脑（右下区域） -->
    <path d="
      M  88, 105
      C 110, 118  130, 138  135, 162
      C 140, 182  130, 198  112, 205
      C  94, 212   74, 205   60, 192
      C  48, 180   46, 162   54, 145
      C  62, 130   76, 116   88, 105
      Z
    " fill="url(#brainFill)" fill-opacity="0.80"/>

    <!-- 脑干（底部） -->
    <path d="
      M -10, 148
      C   5, 155   20, 158   28, 168
      C  34, 178   30, 190   20, 196
      C   8, 202   -8, 200  -18, 192
      C -28, 183  -28, 170  -18, 160
      C  -8, 152    0, 150   -10, 148
      Z
    " fill="url(#brainFill)" fill-opacity="0.65"/>

    <!-- 大脑皮层沟回纹理（简化的波浪线条） -->
    <!-- 上部回 -->
    <path d="M -68,-108 C -40,-118 -10,-112  20,-100 C  45,-90  70,-80  90,-62"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.35"
          stroke-linecap="round"/>
    <!-- 中部回 -->
    <path d="M -72, -55 C -45, -60 -15, -52  15, -42 C  40, -32  68, -22  95, -8"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.30"
          stroke-linecap="round"/>
    <!-- 下部回 -->
    <path d="M -62,  10 C -38,   8  -8,  15   22,  28 C  48,  40  75,  52  98,  65"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.25"
          stroke-linecap="round"/>
    <!-- 小脑纹理 -->
    <path d="M  70, 130 C  88, 142  108, 158  115, 175"
          fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.22"
          stroke-linecap="round"/>
    <path d="M  62, 150 C  80, 162   98, 175  104, 188"
          fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18"
          stroke-linecap="round"/>

    <!-- 半球中线（竖线） -->
    <line x1="-20" y1="-120" x2="-20" y2="145"
          stroke="#0a0d1a" stroke-width="3" stroke-opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- 底部品牌文字 -->
  <text x="256" y="412"
        font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"
        font-size="38" font-weight="700" text-anchor="middle"
        fill="#e0f2fe" letter-spacing="3" filter="url(#textGlow)">
    HyperMarrow
  </text>
  <text x="256" y="442"
        font-family="'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif"
        font-size="14" font-weight="400" text-anchor="middle"
        fill="#64748b" letter-spacing="1.5">
    类人记忆与学习系统
  </text>
</svg>
